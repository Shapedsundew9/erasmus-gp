services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      -  ..:/workspaces:cached
    environment:
      EGP_PRIVATE_KEY_FILE: /run/secrets/private_key
      PRIVATE_KEY_PEM_B64: ${PRIVATE_KEY_PEM_B64:-}
    command: >
      /bin/sh -c "
        if [ -n \"$PRIVATE_KEY_PEM_B64\" ]; then
          mkdir -p /run/secrets;
          printf '%s' \"$PRIVATE_KEY_PEM_B64\" | base64 -d > /run/secrets/private_key;
          chmod 600 /run/secrets/private_key;
          unset PRIVATE_KEY_PEM_B64;
        fi;
        sleep infinity
      "
    depends_on:
      - postgres

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - default
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=nobody@nowhere.com
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-postgres}
      - PGADMIN_DISABLE_POSTFIX=true
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - default
    entrypoint: >
      /bin/sh -c "
        echo 'postgres:5432:*:postgres:'${POSTGRES_PASSWORD:-postgres} > /tmp/pgpass_generated;
        chmod 600 /tmp/pgpass_generated;
        chown 5050:5050 /tmp/pgpass_generated;
        /entrypoint.sh;
      "
volumes:
  postgres_data:
